<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Scan Companion</title>
    <style>
        body {
            background-color: #020c14;
            color: #c8e8f4;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background-color: #061523;
            border: 1px solid #0d2a3d;
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #00ffe0;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .status {
            color: #39ff88;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .info {
            color: #3a6278;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .btn {
            background-color: transparent;
            border: 1px solid #00ffe0;
            color: #00ffe0;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>[ MINT SCAN ]</h1>
        <div class="status">● SECURE CONNECTION</div>
        <p class="info">Device is paired with Linux Desktop</p>
        <div id="device-info" style="margin-top: 20px; text-align: left;">
            <div class="info">User Agent: <span id="ua" style="color:#fff"></span></div>
            <div class="info">Platform: <span id="plat" style="color:#fff"></span></div>
            <div class="info">Cores: <span id="cores" style="color:#fff"></span></div>
            <div class="info">Memory: <span id="mem" style="color:#fff"></span></div>
        </div>
        <a href="#" class="btn" onclick="location.reload()">⟳ REFRESH</a>
    </div>

    <script>
        document.getElementById('ua').textContent = navigator.userAgent.split(')')[0] + ')';
        document.getElementById('plat').textContent = navigator.platform;
        document.getElementById('cores').textContent = navigator.hardwareConcurrency || 'Unknown';
        document.getElementById('mem').textContent = (navigator.deviceMemory || 'Unknown') + ' GB';
    </script>
</body>
</html>
