<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Scan Companion v7</title>
    <style>
        :root {
            --bg: #020c14; --sf: #061523; --s2: #0a1e2e;
            --br: #0d2a3d; --ac: #00ffe0; --tx: #c8e8f4;
            --mu: #3a6278; --ok: #39ff88; --wn: #ff4c4c;
        }
        body {
            background: var(--bg); color: var(--tx);
            font-family: 'Courier New', monospace; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: var(--sf); padding: 15px; text-align: center;
            border-bottom: 2px solid var(--br);
        }
        h1 { color: var(--ac); margin: 0; font-size: 20px; letter-spacing: 2px; }
        
        .tabs { display: flex; background: var(--s2); border-bottom: 1px solid var(--br); }
        .tab { 
            flex: 1; padding: 12px; text-align: center; font-size: 12px; 
            color: var(--mu); cursor: pointer; border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--ac); border-bottom-color: var(--ac); font-weight: bold; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { 
            background: var(--sf); border: 1px solid var(--br); 
            border-radius: 8px; padding: 15px; margin-bottom: 15px;
        }
        .label { color: var(--mu); font-size: 10px; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 16px; margin-bottom: 10px; color: #fff; }
        
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
        
        .btn {
            display: block; width: 100%; padding: 12px; margin-top: 10px;
            background: transparent; border: 1px solid var(--ac); color: var(--ac);
            text-align: center; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        .btn:active { background: rgba(0, 255, 224, 0.1); }
        
        .sync-status { font-size: 10px; text-align: center; margin-top: 10px; color: var(--mu); }
        #log { font-size: 9px; color: var(--mu); margin-top: 10px; height: 60px; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>[ MINT SCAN ]</h1>
    <div style="font-size: 10px; color: var(--mu); margin-top: 4px;">COMPANION v7.0</div>
</header>

<div class="tabs">
    <div class="tab active" onclick="showPage('sys')">SYSTEM</div>
    <div class="tab" onclick="showPage('net')">NETWORK</div>
    <div class="tab" onclick="showPage('sync')">SYNC</div>
</div>

<div class="content">
    <!-- SYSTEM PAGE -->
    <div id="page-sys" class="page active">
        <div class="card">
            <div class="label">Device Info</div>
            <div class="value" id="val-device">Loading...</div>
            <div class="label">Platform</div>
            <div class="value" id="val-plat">—</div>
            <div class="label">CPU Cores</div>
            <div class="value" id="val-cores">—</div>
        </div>
        <div class="card">
            <div class="label">Battery Status</div>
            <div id="bat-status" class="value"><span class="status-dot"></span> —</div>
            <div id="bat-bar-bg" style="background: var(--br); height: 8px; border-radius: 4px;">
                <div id="bat-bar" style="background: var(--ok); height: 100%; width: 0%; border-radius: 4px; transition: width 0.5s;"></div>
            </div>
        </div>
    </div>

    <!-- NETWORK PAGE -->
    <div id="page-net" class="page">
        <div class="card">
            <div class="label">Connection Type</div>
            <div class="value" id="val-net-type">Detecting...</div>
            <div class="label">Downlink Speed</div>
            <div class="value" id="val-net-speed">—</div>
            <div class="label">Round Trip Time (RTT)</div>
            <div class="value" id="val-net-rtt">—</div>
        </div>
        <div class="card">
            <div class="label">Location (GPS/IP)</div>
            <div class="value" id="val-loc">Not Requested</div>
            <button class="btn" onclick="requestLocation()" style="font-size: 10px; padding: 6px;">REQUEST PERMISSION</button>
        </div>
    </div>

    <!-- SYNC PAGE -->
    <div id="page-sync" class="page">
        <div class="card">
            <div class="label">Desktop Server URL</div>
            <input type="text" id="server-url" placeholder="http://192.168.1.x:8080" 
                   style="width: 100%; background: var(--bg); border: 1px solid var(--br); color: var(--ac); padding: 8px; box-sizing: border-box; margin-bottom: 10px;">
            <div class="label">Sync Status</div>
            <div id="sync-status-val" class="value">Idle</div>
            <button class="btn" id="btn-sync" onclick="toggleSync()">▶ START AUTO-SYNC</button>
        </div>
        <div id="log"></div>
    </div>
</div>

<script>
    let syncInterval = null;
    let syncData = { lat: null, lon: null, acc: null };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        event.target.classList.add('active');
    }

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>${l.innerHTML}`;
    }

    // --- DATA COLLECTION ---
    function updateStats() {
        // System
        document.getElementById('val-device').textContent = navigator.userAgent.split('(')[1].split(')')[0];
        document.getElementById('val-plat').textContent = navigator.platform;
        document.getElementById('val-cores').textContent = navigator.hardwareConcurrency + " Cores";
        
        // Battery
        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                const lvl = Math.round(bat.level * 100);
                document.getElementById('bat-status').innerHTML = `<span class="status-dot ${lvl > 20 ? 'status-ok' : ''}" style="background:${lvl > 20 ? '' : 'var(--wn)'}"></span> ${lvl}% ${bat.charging ? '(Charging)' : ''}`;
                document.getElementById('bat-bar').style.width = lvl + '%';
                document.getElementById('bat-bar').style.background = lvl > 50 ? 'var(--ok)' : lvl > 20 ? '#ffb830' : 'var(--wn)';
            });
        }

        // Network
        if (navigator.connection) {
            const conn = navigator.connection;
            document.getElementById('val-net-type').textContent = conn.type || conn.effectiveType || 'Unknown';
            document.getElementById('val-net-speed').textContent = conn.downlink + " Mbps";
            document.getElementById('val-net-rtt').textContent = conn.rtt + " ms";
        }
    }

    function requestLocation() {
        if (!navigator.geolocation) return log("GPS not supported");
        log("Requesting GPS...");
        navigator.geolocation.getCurrentPosition(pos => {
            syncData.lat = pos.coords.latitude;
            syncData.lon = pos.coords.longitude;
            syncData.acc = pos.coords.accuracy;
            document.getElementById('val-loc').textContent = `${syncData.lat.toFixed(4)}, ${syncData.lon.toFixed(4)} (±${Math.round(syncData.acc)}m)`;
            log("GPS updated");
        }, err => log("GPS Error: " + err.message));
    }

    // --- SYNC ENGINE ---
    async function postSync(path, data) {
        const baseUrl = document.getElementById('server-url').value.trim();
        if (!baseUrl) return;
        try {
            const res = await fetch(baseUrl + path, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            return res.ok;
        } catch (e) {
            return false;
        }
    }

    async function performSync() {
        const url = document.getElementById('server-url').value;
        if (!url) return;

        log("Syncing...");
        
        // 1. Device Info
        await postSync('/sync/device', {
            platform: navigator.platform,
            browser: navigator.userAgent,
            cores: navigator.hardwareConcurrency,
            memory: navigator.deviceMemory
        });

        // 2. Battery
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            await postSync('/sync/battery', {
                level: Math.round(bat.level * 100),
                charging: bat.charging
            });
        }

        // 3. Network
        if (navigator.connection) {
            await postSync('/sync/network', {
                type: navigator.connection.effectiveType,
                downlink: navigator.connection.downlink,
                rtt: navigator.connection.rtt
            });
        }

        // 4. Location
        if (syncData.lat) {
            await postSync('/sync/location', syncData);
        }

        document.getElementById('sync-status-val').textContent = "Last Sync: " + new Date().toLocaleTimeString();
    }

    function toggleSync() {
        const btn = document.getElementById('btn-sync');
        if (syncInterval) {
            clearInterval(syncInterval);
            syncInterval = null;
            btn.textContent = "▶ START AUTO-SYNC";
            btn.style.borderColor = "var(--ac)";
            log("Sync stopped");
        } else {
            const url = document.getElementById('server-url').value;
            if (!url) return alert("Enter Server URL first!");
            performSync();
            syncInterval = setInterval(performSync, 5000);
            btn.textContent = "⏹ STOP AUTO-SYNC";
            btn.style.borderColor = "var(--wn)";
            log("Sync started (5s interval)");
        }
    }

    // Init
    setInterval(updateStats, 2000);
    updateStats();
    
    // Auto-fill server URL if in query string (for easy setup)
    const params = new URLSearchParams(window.location.search);
    if (params.has('s')) document.getElementById('server-url').value = params.get('s');

</script>
</body>
</html>
